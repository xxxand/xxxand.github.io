<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫雷</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  user-select: none;
  padding: 10px;
}
.container {
  text-align: center;
  width: 100%;
  max-width: 400px;
}
h1 {
  color: #e74c3c;
  font-size: 2.5rem;
  margin-bottom: 10px;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  padding: 0 5px;
}
.header-item {
  background: #2c3e50;
  color: #e74c3c;
  padding: 6px 16px;
  border-radius: 6px;
  font-size: 1.3rem;
  font-weight: bold;
  min-width: 70px;
  text-align: center;
}
.header-label {
  color: #888;
  font-size: 0.8rem;
}
.board {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 2px;
  background: #34495e;
  padding: 4px;
  border-radius: 6px;
  width: 100%;
  aspect-ratio: 1;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}
.cell {
  background: #5d6d7e;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.1s;
  aspect-ratio: 1;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
}
.cell:hover { background: #6e7f91; }
.cell.revealed {
  background: #bdc3c7;
  cursor: default;
}
.cell.revealed:hover { background: #bdc3c7; }
.cell.flagged { background: #5d6d7e; }
.cell.mine { background: #e74c3c; }
.cell[data-n="1"] { color: #3498db; }
.cell[data-n="2"] { color: #2ecc71; }
.cell[data-n="3"] { color: #e74c3c; }
.cell[data-n="4"] { color: #8e44ad; }
.cell[data-n="5"] { color: #c0392b; }
.cell[data-n="6"] { color: #16a085; }
.cell[data-n="7"] { color: #2c3e50; }
.cell[data-n="8"] { color: #7f8c8d; }
.controls {
  margin-top: 15px;
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}
.btn {
  padding: 10px 25px;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-new {
  background: #e74c3c;
  color: #fff;
}
.btn-new:hover { background: #c0392b; }
.btn-back {
  background: rgba(255,255,255,0.1);
  color: #ccc;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
}
.btn-back:hover { background: rgba(255,255,255,0.2); }
.info {
  color: #888;
  margin-top: 10px;
  font-size: 0.85rem;
}
.game-over-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.game-over-box {
  background: #1a1a2e;
  border: 2px solid #e74c3c;
  border-radius: 20px;
  padding: 40px 50px;
  text-align: center;
  color: #fff;
}
.game-over-box h2 { font-size: 2rem; margin-bottom: 15px; }
.game-over-box p { font-size: 1.2rem; margin-bottom: 20px; }
.game-over-box .win { color: #2ecc71; }
.game-over-box .lose { color: #e74c3c; }
.game-over-btns {
  display: flex;
  gap: 10px;
  justify-content: center;
}
.btn-cancel {
  background: rgba(255,255,255,0.1);
  color: #ccc;
}
.btn-cancel:hover { background: rgba(255,255,255,0.2); }
.hidden { display: none !important; }
@media (max-width: 450px) {
  h1 { font-size: 2rem; }
  .cell { font-size: 1rem; }
}
</style>
</head>
<body>
<div class="container">
  <h1>💣 扫雷</h1>
  <div class="header">
    <div>
      <div class="header-label">💣</div>
      <div class="header-item" id="mineCount">10</div>
    </div>
    <div>
      <div class="header-label">⏱</div>
      <div class="header-item" id="timer">0</div>
    </div>
  </div>
  <div class="board" id="board"></div>
  <div class="controls">
    <button class="btn btn-new" id="btnRestart">新游戏</button>
    <a href="index.html" class="btn btn-back">返回首页</a>
  </div>
  <p class="info">点击揭开 · 长按/右键标旗</p>
</div>

<div class="game-over-overlay hidden" id="overlay">
  <div class="game-over-box">
    <h2 id="overlayTitle"></h2>
    <p>用时: <span id="finalTime">0</span> 秒</p>
    <div class="game-over-btns">
      <button class="btn btn-new" id="btnReplay">再来一局</button>
      <button class="btn btn-cancel" id="btnDismiss">取消</button>
    </div>
  </div>
</div>

<script>
const ROWS = 9, COLS = 9, MINES = 10;
let board = [];
let revealed = [];
let flagged = [];
let gameOver = false;
let gameWon = false;
let firstClick = true;
let timeElapsed = 0;
let timerInterval = null;
let flagCount = 0;

const boardEl = document.getElementById('board');
const mineCountEl = document.getElementById('mineCount');
const timerEl = document.getElementById('timer');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const finalTimeEl = document.getElementById('finalTime');

function initBoard() {
  board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
  revealed = Array(ROWS).fill(null).map(() => Array(COLS).fill(false));
  flagged = Array(ROWS).fill(null).map(() => Array(COLS).fill(false));
  gameOver = false;
  gameWon = false;
  firstClick = true;
  flagCount = 0;
  timeElapsed = 0;
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  mineCountEl.textContent = MINES;
  timerEl.textContent = '0';
  overlay.classList.add('hidden');
  renderBoard();
}

function placeMines(excludeR, excludeC) {
  let placed = 0;
  while (placed < MINES) {
    const r = Math.floor(Math.random() * ROWS);
    const c = Math.floor(Math.random() * COLS);
    if (board[r][c] === -1) continue;
    if (Math.abs(r - excludeR) <= 1 && Math.abs(c - excludeC) <= 1) continue;
    board[r][c] = -1;
    placed++;
  }
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c] === -1) continue;
      let count = 0;
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === -1) count++;
        }
      board[r][c] = count;
    }
  }
}

function renderBoard() {
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;

      if (revealed[r][c]) {
        cell.classList.add('revealed');
        if (board[r][c] === -1) {
          cell.classList.add('mine');
          cell.textContent = '💣';
        } else if (board[r][c] > 0) {
          cell.textContent = board[r][c];
          cell.setAttribute('data-n', board[r][c]);
        }
      } else if (flagged[r][c]) {
        cell.classList.add('flagged');
        cell.textContent = '🚩';
      }

      cell.addEventListener('click', (e) => {
        e.preventDefault();
        handleClick(r, c);
      });

      cell.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        toggleFlag(r, c);
      });

      boardEl.appendChild(cell);
    }
  }
  mineCountEl.textContent = MINES - flagCount;
}

function handleClick(r, c) {
  if (gameOver || flagged[r][c] || revealed[r][c]) return;

  if (firstClick) {
    placeMines(r, c);
    firstClick = false;
    startTimer();
  }

  reveal(r, c);
  renderBoard();

  if (gameOver) {
    revealAll();
    renderBoard();
    stopTimer();
    overlayTitle.innerHTML = '<span class="lose">游戏结束</span>';
    finalTimeEl.textContent = timeElapsed;
    overlay.classList.remove('hidden');
  }
}

function reveal(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
  if (revealed[r][c] || flagged[r][c]) return;

  revealed[r][c] = true;

  if (board[r][c] === -1) {
    gameOver = true;
    return;
  }

  if (board[r][c] === 0) {
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++)
        if (dr !== 0 || dc !== 0) reveal(r + dr, c + dc);
  }

  checkWin();
}

function toggleFlag(r, c) {
  if (gameOver || revealed[r][c]) return;
  if (firstClick) return;

  flagged[r][c] = !flagged[r][c];
  flagCount += flagged[r][c] ? 1 : -1;
  renderBoard();
}

function checkWin() {
  let allRevealed = true;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c] !== -1 && !revealed[r][c]) { allRevealed = false; break; }
  if (!allRevealed) return;

  gameOver = true;
  gameWon = true;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c] === -1) flagged[r][c] = true;

  renderBoard();
  stopTimer();
  overlayTitle.innerHTML = '<span class="win">你赢了!</span>';
  finalTimeEl.textContent = timeElapsed;
  overlay.classList.remove('hidden');
}

function revealAll() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c] === -1) revealed[r][c] = true;
}

function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    timeElapsed++;
    timerEl.textContent = timeElapsed;
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

let longPressTimer;
boardEl.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const cell = e.target.closest('.cell');
  if (!cell) return;
  const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
  longPressTimer = setTimeout(() => toggleFlag(r, c), 400);
});

boardEl.addEventListener('touchend', (e) => {
  clearTimeout(longPressTimer);
});

boardEl.addEventListener('touchmove', (e) => {
  clearTimeout(longPressTimer);
});

document.getElementById('btnRestart').addEventListener('click', initBoard);
document.getElementById('btnReplay').addEventListener('click', initBoard);
document.getElementById('btnDismiss').addEventListener('click', () => overlay.classList.add('hidden'));

initBoard();
</script>
</body>
</html>
