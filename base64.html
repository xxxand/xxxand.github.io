<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Base64 编解码</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        min-height: 100vh;
        color: #fff;
        padding: 40px 20px;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      .back {
        display: inline-block;
        color: #aaa;
        text-decoration: none;
        margin-bottom: 24px;
        font-size: 0.9rem;
      }
      .back:hover {
        color: #fff;
      }
      h1 {
        font-size: 1.8rem;
        margin-bottom: 8px;
      }
      .subtitle {
        color: #888;
        margin-bottom: 24px;
        font-size: 0.9rem;
      }
      .row {
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-bottom: 16px;
      }
      label {
        font-size: 0.9rem;
        color: #aaa;
      }
      textarea {
        width: 100%;
        min-height: 120px;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.05);
        color: #ddd;
        font-family: "Consolas", "Courier New", monospace;
        font-size: 0.95rem;
        resize: vertical;
      }
      textarea:focus {
        outline: none;
        border-color: rgba(100, 200, 255, 0.5);
      }
      .btns {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .btn {
        padding: 10px 28px;
        border: none;
        border-radius: 8px;
        font-size: 0.95rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-convert {
        background: #e67e22;
        color: #fff;
      }
      .btn-convert:hover {
        background: #cf6d17;
      }
      .btn-copy {
        background: rgba(255, 255, 255, 0.1);
        color: #ccc;
      }
      .btn-copy:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      .btn-swap {
        background: rgba(255, 255, 255, 0.06);
        color: #aaa;
        font-size: 1.2rem;
        padding: 10px 16px;
      }
      .btn-swap:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      .mode {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }
      @media (max-width: 600px) {
        textarea {
          min-height: 100px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="index.html" class="back">← 返回首页</a>
      <h1>Base64 编解码</h1>
      <p class="subtitle">文本 ↔ Base64 编码</p>

      <div class="mode">
        <span id="modeText">当前：编码 (文本 → Base64)</span>
        <button class="btn btn-swap" id="btnSwap" title="切换方向">⇄</button>
      </div>
      <div class="row">
        <label for="inputBox">输入</label>
        <textarea id="inputBox" placeholder="输入文本或 Base64 字符串..."></textarea>
      </div>
      <div class="btns">
        <button class="btn btn-convert" id="btnConvert">转换</button>
        <button class="btn btn-copy" id="btnCopy">复制结果</button>
      </div>
      <div class="row" style="margin-top: 16px">
        <label for="outputBox">输出</label>
        <textarea id="outputBox" readonly></textarea>
      </div>
    </div>

    <script>
      var direction = 0;
      var inputBox = document.getElementById("inputBox");
      var outputBox = document.getElementById("outputBox");
      var modeText = document.getElementById("modeText");

      function encodeBase64(str) {
        return btoa(unescape(encodeURIComponent(str)));
      }

      function decodeBase64(str) {
        return decodeURIComponent(escape(atob(str)));
      }

      document.getElementById("btnConvert").addEventListener("click", function () {
        var input = inputBox.value;
        try {
          outputBox.value = direction === 0 ? encodeBase64(input) : decodeBase64(input);
        } catch (e) {
          outputBox.value = "转换出错，请检查输入格式";
        }
      });

      document.getElementById("btnCopy").addEventListener("click", function () {
        outputBox.select();
        document.execCommand("copy");
      });

      document.getElementById("btnSwap").addEventListener("click", function () {
        direction = direction === 0 ? 1 : 0;
        modeText.textContent =
          direction === 0 ? "当前：编码 (文本 → Base64)" : "当前：解码 (Base64 → 文本)";
        outputBox.value = "";
      });
    </script>
  </body>
</html>
