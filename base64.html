<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Base64 编解码</title>
    <link rel="stylesheet" href="css/base64.css" />
  </head>
  <body>
    <div class="container">
      <a href="index.html" class="back">← 返回首页</a>
      <h1>Base64 编解码</h1>
      <p class="subtitle">文本 ↔ Base64 编码</p>

      <div class="mode">
        <span id="modeText">当前：编码 (文本 → Base64)</span>
        <button class="btn btn-swap" id="btnSwap" title="切换方向">⇄</button>
      </div>
      <div class="row">
        <label for="inputBox">输入</label>
        <textarea id="inputBox" placeholder="输入文本或 Base64 字符串..."></textarea>
      </div>
      <div class="btns">
        <button class="btn btn-convert" id="btnConvert">转换</button>
        <button class="btn btn-copy" id="btnCopy">复制结果</button>
      </div>
      <div class="row" style="margin-top: 16px">
        <label for="outputBox">输出</label>
        <textarea id="outputBox" readonly></textarea>
      </div>
    </div>

    <script src="js/base64.js" defer></script>
  </body>
</html>
