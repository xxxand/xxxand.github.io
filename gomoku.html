<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  user-select: none;
  padding: 10px;
}
.container {
  text-align: center;
  width: 100%;
  max-width: 630px;
}
h1 {
  color: #e0c080;
  font-size: 3rem;
  margin-bottom: 15px;
}
.status {
  color: #fff;
  font-size: 1.5rem;
  margin-bottom: 15px;
  min-height: 1.8em;
}
.status .player {
  display: inline-block;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  vertical-align: middle;
  margin: 0 5px;
  border: 2px solid #555;
}
.status .player.black { background: #222; }
.status .player.white { background: #eee; }
.status .highlight {
  color: #4caf50;
  font-weight: bold;
  font-size: 1.5rem;
}
canvas {
  cursor: pointer;
  border-radius: 8px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  width: 100%;
  max-width: 630px;
  aspect-ratio: 1;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.controls {
  margin-top: 15px;
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
}
.btn {
  padding: 10px 30px;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-new {
  background: #4caf50;
  color: #fff;
}
.btn-new:hover { background: #45a049; }
.btn-back {
  background: rgba(255,255,255,0.1);
  color: #ccc;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
}
.btn-back:hover { background: rgba(255,255,255,0.2); }
.options {
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-forbidden {
  background: rgba(255,255,255,0.08);
  color: #999;
  border: 1px solid #555;
  padding: 8px 24px;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-forbidden.on {
  background: #e67e22;
  color: #fff;
  border-color: #e67e22;
}
.btn-forbidden:hover { border-color: #e67e22; color: #e67e22; }
.btn-forbidden.on:hover { opacity: 0.9; color: #fff; }
.btn-ai {
  background: rgba(255,255,255,0.08);
  color: #999;
  border: 1px solid #555;
  padding: 8px 24px;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-ai.on {
  background: #3498db;
  color: #fff;
  border-color: #3498db;
}
.btn-ai:hover { border-color: #3498db; color: #3498db; }
.btn-ai.on:hover { opacity: 0.9; color: #fff; }
.btn-undo {
  background: rgba(255,255,255,0.08);
  color: #ccc;
  border: 1px solid #555;
}
.btn-undo:hover { background: rgba(255,255,255,0.15); border-color: #888; }
.game-over-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
}
.game-over-box {
  background: #1a1a2e;
  border: 2px solid #e0c080;
  border-radius: 20px;
  padding: 40px 50px;
  text-align: center;
  color: #fff;
}
.game-over-box h2 { font-size: 2rem; margin-bottom: 15px; }
.game-over-box p { font-size: 1.1rem; margin-bottom: 20px; }
.game-over-btns { display: flex; gap: 12px; justify-content: center; }
.btn-cancel { background: rgba(255,255,255,0.15); color: #ccc; }
.btn-cancel:hover { background: rgba(255,255,255,0.25); }
.hidden { display: none !important; }
.info {
  color: #888;
  margin-top: 10px;
  font-size: 0.9rem;
}
@media (max-width: 500px) {
  h1 { font-size: 2rem; }
  .status { font-size: 1.1rem; }
  .info { font-size: 0.8rem; }
  .btn { padding: 8px 20px; font-size: 0.9rem; }
}
</style>
</head>
<body>
<div class="container">
  <h1>⚫ 五子棋 ⚪</h1>
  <div class="status" id="status">
    黑棋 <span class="player black"></span> 先行
  </div>
  <canvas id="canvas"></canvas>
  <div class="options">
    <button class="btn btn-forbidden" id="btnForbidden">禁手：关</button>
    <button class="btn btn-ai" id="btnAI">双人对战</button>
  </div>
  <div class="controls">
    <button class="btn btn-new" id="btnRestart">重新开始</button>
    <button class="btn btn-undo" id="btnUndo">悔棋</button>
    <a href="index.html" class="btn btn-back">返回首页</a>
  </div>
  <p class="info">点击棋盘落子 · 先连成五子者胜</p>
</div>

<div class="game-over-overlay hidden" id="overlay">
  <div class="game-over-box">
    <h2 id="overlayTitle"></h2>
    <p id="overlayMsg"></p>
    <div class="game-over-btns">
      <button class="btn btn-new" id="btnReplay">再来一局</button>
      <button class="btn btn-cancel" id="btnDismiss">取消</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const btnForbidden = document.getElementById('btnForbidden');
const btnAI = document.getElementById('btnAI');
const displaySize = 630;
const boardSize = 15;

const dpr = window.devicePixelRatio || 1;
canvas.width = displaySize * dpr;
canvas.height = displaySize * dpr;
ctx.scale(dpr, dpr);

const cellSize = displaySize / (boardSize + 1);
const margin = cellSize;
const directions = [[0,1],[1,0],[1,1],[1,-1]];

let board = Array(boardSize).fill(null).map(() => Array(boardSize).fill(0));
let currentPlayer = 1;
let gameOver = false;
let winLine = null;
let lastMoveR = -1, lastMoveC = -1;
let forbiddenEnabled = false;
let aiEnabled = false;
let aiThinking = false;
let moveHistory = [];

function drawBoard() {
  ctx.fillStyle = '#deb887';
  ctx.fillRect(0, 0, displaySize, displaySize);

  const bgGradient = ctx.createLinearGradient(0, 0, displaySize, displaySize);
  bgGradient.addColorStop(0, '#deb887');
  bgGradient.addColorStop(0.5, '#d2a679');
  bgGradient.addColorStop(1, '#c8956c');
  ctx.fillStyle = bgGradient;
  ctx.fillRect(0, 0, displaySize, displaySize);

  ctx.strokeStyle = '#5a3e2b';
  ctx.lineWidth = 0.8;
  for (let i = 0; i < boardSize; i++) {
    const pos = margin + i * cellSize;
    ctx.beginPath();
    ctx.moveTo(margin, pos);
    ctx.lineTo(margin + (boardSize - 1) * cellSize, pos);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pos, margin);
    ctx.lineTo(pos, margin + (boardSize - 1) * cellSize);
    ctx.stroke();
  }

  const starPoints = [[3,3],[3,11],[7,7],[11,3],[11,11]];
  starPoints.forEach(([r, c]) => {
    const x = margin + c * cellSize;
    const y = margin + r * cellSize;
    ctx.fillStyle = '#5a3e2b';
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();
  });

  for (let r = 0; r < boardSize; r++) {
    for (let c = 0; c < boardSize; c++) {
      if (board[r][c] === 0) continue;
      const x = margin + c * cellSize;
      const y = margin + r * cellSize;
      const radius = cellSize * 0.42;

      if (board[r][c] === 1) {
        const grad = ctx.createRadialGradient(x - radius*0.3, y - radius*0.3, radius*0.1, x, y, radius);
        grad.addColorStop(0, '#555');
        grad.addColorStop(0.6, '#111');
        grad.addColorStop(1, '#000');
        ctx.fillStyle = grad;
      } else {
        const grad = ctx.createRadialGradient(x - radius*0.3, y - radius*0.3, radius*0.1, x, y, radius);
        grad.addColorStop(0, '#fff');
        grad.addColorStop(0.6, '#ddd');
        grad.addColorStop(1, '#bbb');
        ctx.fillStyle = grad;
      }

      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();

      if (r === lastMoveR && c === lastMoveC) {
        ctx.strokeStyle = '#ff4444';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, radius * 0.35, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
  }

  if (winLine) {
    const [r1, c1] = winLine[0];
    const [r2, c2] = winLine[1];
    const x1 = margin + c1 * cellSize;
    const y1 = margin + r1 * cellSize;
    const x2 = margin + c2 * cellSize;
    const y2 = margin + r2 * cellSize;

    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 4]);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function getIntersection(px, py) {
  const c = Math.round((px - margin) / cellSize);
  const r = Math.round((py - margin) / cellSize);
  const cx = margin + c * cellSize;
  const cy = margin + r * cellSize;
  const dist = Math.hypot(px - cx, py - cy);
  if (r < 0 || r >= boardSize || c < 0 || c >= boardSize) return null;
  if (dist > cellSize * 0.45) return null;
  return {r, c};
}

function analyzeLine(r, c, dr, dc, player) {
  let countPos = 0;
  for (let i = 1; i <= 5; i++) {
    const nr = r + dr * i, nc = c + dc * i;
    if (nr < 0 || nr >= boardSize || nc < 0 || nc >= boardSize) break;
    if (board[nr][nc] !== player) break;
    countPos++;
  }
  let posSpace = 0;
  for (let i = countPos + 1; i <= 5; i++) {
    const nr = r + dr * i, nc = c + dc * i;
    if (nr < 0 || nr >= boardSize || nc < 0 || nc >= boardSize) break;
    if (board[nr][nc] !== 0) break;
    posSpace++;
  }
  let countNeg = 0;
  for (let i = 1; i <= 5; i++) {
    const nr = r - dr * i, nc = c - dc * i;
    if (nr < 0 || nr >= boardSize || nc < 0 || nc >= boardSize) break;
    if (board[nr][nc] !== player) break;
    countNeg++;
  }
  let negSpace = 0;
  for (let i = countNeg + 1; i <= 5; i++) {
    const nr = r - dr * i, nc = c - dc * i;
    if (nr < 0 || nr >= boardSize || nc < 0 || nc >= boardSize) break;
    if (board[nr][nc] !== 0) break;
    negSpace++;
  }
  const total = 1 + countPos + countNeg;
  return { total, posSpace, negSpace };
}

function isForbidden(r, c) {
  if (!forbiddenEnabled) return false;
  let threeCount = 0, fourCount = 0;
  for (const [dr, dc] of directions) {
    const { total, posSpace, negSpace } = analyzeLine(r, c, dr, dc, 1);
    if (total >= 6) return true;
    if (total === 5) return false;
    if (total === 4 && (posSpace >= 1 || negSpace >= 1)) fourCount++;
    if (total === 3 && posSpace >= 1 && negSpace >= 1) threeCount++;
  }
  return threeCount >= 2 || fourCount >= 2;
}

function checkWin(r, c, player) {
  for (const [dr, dc] of directions) {
    let count = 1, i = 1;
    let startR = r, startC = c, endR = r, endC = c;
    while (true) {
      const nr = r + dr * i, nc = c + dc * i;
      if (nr < 0 || nr >= boardSize || nc < 0 || nc >= boardSize || board[nr][nc] !== player) break;
      count++; endR = nr; endC = nc; i++;
    }
    i = 1;
    while (true) {
      const nr = r - dr * i, nc = c - dc * i;
      if (nr < 0 || nr >= boardSize || nc < 0 || nc >= boardSize || board[nr][nc] !== player) break;
      count++; startR = nr; startC = nc; i++;
    }
    if (count >= 5) {
      winLine = [[startR, startC], [endR, endC]];
      return true;
    }
  }
  return false;
}

function evaluateBoard() {
  let score = 0;
  let done = new Set();
  for (let r = 0; r < boardSize; r++) {
    for (let c = 0; c < boardSize; c++) {
      if (board[r][c] === 0) continue;
      const player = board[r][c];
      for (const [dr, dc] of directions) {
        const key = r * boardSize * 4 + c * 4 + directions.findIndex(d => d[0]===dr && d[1]===dc);
        const pr = r - dr, pc = c - dc;
        if (pr >= 0 && pr < boardSize && pc >= 0 && pc < boardSize && board[pr][pc] === player) continue;
        let count = 0;
        for (let i = 0; i < 5; i++) {
          const nr = r + dr * i, nc = c + dc * i;
          if (nr >= 0 && nr < boardSize && nc >= 0 && nc < boardSize && board[nr][nc] === player) count++;
          else break;
        }
        let openEnds = 0;
        const epr = r - dr, epc = c - dc;
        if (epr >= 0 && epr < boardSize && epc >= 0 && epc < boardSize && board[epr][epc] === 0) {
          let room = 0;
          for (let j = 0; j < 5 - count; j++) {
            const rr = epr - dr * j, cc = epc - dc * j;
            if (rr >= 0 && rr < boardSize && cc >= 0 && cc < boardSize && board[rr][cc] === 0) room++;
            else break;
          }
          if (room >= 5 - count) openEnds++;
        }
        const er = r + dr * count, ec = c + dc * count;
        if (er >= 0 && er < boardSize && ec >= 0 && ec < boardSize && board[er][ec] === 0) {
          let room = 0;
          for (let j = 0; j < 5 - count; j++) {
            const rr = er + dr * j, cc = ec + dc * j;
            if (rr >= 0 && rr < boardSize && cc >= 0 && cc < boardSize && board[rr][cc] === 0) room++;
            else break;
          }
          if (room >= 5 - count) openEnds++;
        }
        let s = 0;
        if (count >= 5) s = 1000000;
        else if (count === 4) s = openEnds === 2 ? 100000 : (openEnds === 1 ? 10000 : 0);
        else if (count === 3) s = openEnds === 2 ? 8000 : (openEnds === 1 ? 500 : 0);
        else if (count === 2) s = openEnds === 2 ? 500 : (openEnds === 1 ? 50 : 0);
        else if (count === 1) s = openEnds === 2 ? 10 : (openEnds === 1 ? 3 : 0);
        if (player === 2) score += s; else score -= s;
      }
    }
  }
  return score;
}

function getCandidates() {
  const candidates = [];
  const visited = new Set();
  for (let r = 0; r < boardSize; r++) {
    for (let c = 0; c < boardSize; c++) {
      if (board[r][c] !== 0) {
        for (let dr = -2; dr <= 2; dr++) {
          for (let dc = -2; dc <= 2; dc++) {
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < boardSize && nc >= 0 && nc < boardSize && board[nr][nc] === 0) {
              const key = nr * boardSize + nc;
              if (!visited.has(key)) {
                visited.add(key);
                candidates.push({r: nr, c: nc});
              }
            }
          }
        }
      }
    }
  }
  if (candidates.length === 0) candidates.push({r: 7, c: 7});
  return candidates;
}

function alphaBeta(depth, alpha, beta, player) {
  if (depth === 0) return evaluateBoard();
  let candidates = getCandidates();
  if (candidates.length > 20) {
    candidates = candidates.map(m => {
      board[m.r][m.c] = player;
      const s = evaluateBoard();
      board[m.r][m.c] = 0;
      return {r: m.r, c: m.c, score: s};
    });
    candidates.sort((a,b) => player === 2 ? b.score - a.score : a.score - b.score);
    candidates = candidates.slice(0, 20).map(m => ({r: m.r, c: m.c}));
  }
  if (player === 2) {
    let maxEval = -Infinity;
    for (const {r, c} of candidates) {
      board[r][c] = 2;
      if (checkWin(r, c, 2)) { board[r][c] = 0; winLine = null; return 1000000 + depth; }
      if (forbiddenEnabled && isForbidden(r, c)) {
        // AI should avoid forbidden moves (AI doesn't play forbidden anyway)
      }
      const eval = alphaBeta(depth - 1, alpha, beta, 1);
      board[r][c] = 0;
      maxEval = Math.max(maxEval, eval);
      alpha = Math.max(alpha, eval);
      if (beta <= alpha) break;
    }
    return maxEval;
  } else {
    let minEval = Infinity;
    for (const {r, c} of candidates) {
      board[r][c] = 1;
      if (checkWin(r, c, 1)) { board[r][c] = 0; winLine = null; return -1000000 - depth; }
      let skip = false;
      if (forbiddenEnabled) {
        let tmp = board[r][c]; board[r][c] = 1;
        if (isForbidden(r, c)) skip = true;
        board[r][c] = tmp;
      }
      if (skip) continue;
      board[r][c] = 1;
      const eval = alphaBeta(depth - 1, alpha, beta, 2);
      board[r][c] = 0;
      minEval = Math.min(minEval, eval);
      beta = Math.min(beta, eval);
      if (beta <= alpha) break;
    }
    return minEval;
  }
}

function aiMove() {
  aiThinking = true;
  statusEl.innerHTML = '白棋 <span class="player white"></span> AI思考中...';
  drawBoard();
  setTimeout(() => {
    const candidates = getCandidates();
    for (const {r, c} of candidates) {
      board[r][c] = 2;
      if (checkWin(r, c, 2)) { board[r][c] = 0; applyAIMove(r, c); return; }
      board[r][c] = 0;
    }
    winLine = null;
    for (const {r, c} of candidates) {
      board[r][c] = 1;
      if (checkWin(r, c, 1)) { board[r][c] = 0; applyAIMove(r, c); return; }
      board[r][c] = 0;
    }
    winLine = null;
    let scored = candidates.map(m => {
      board[m.r][m.c] = 2;
      const s = evaluateBoard();
      board[m.r][m.c] = 0;
      return {r: m.r, c: m.c, score: s};
    });
    scored.sort((a, b) => b.score - a.score);
    const top = scored.slice(0, 12);
    let bestScore = -Infinity, bestMoves = [];
    for (const {r, c} of top) {
      board[r][c] = 2;
      if (forbiddenEnabled && isForbidden(r, c)) { board[r][c] = 0; continue; }
      const score = alphaBeta(5, -Infinity, Infinity, 1) + (Math.random() - 0.5) * 2;
      board[r][c] = 0;
      if (score > bestScore) { bestScore = score; bestMoves = [{r, c}]; }
      else if (Math.abs(score - bestScore) < 0.01) { bestMoves.push({r, c}); }
    }
    winLine = null;
    let bestMove = bestMoves[Math.floor(Math.random() * bestMoves.length)];
    applyAIMove(bestMove.r, bestMove.c);
  }, 50);
}

function applyAIMove(r, c) {
  aiThinking = false;
  winLine = null;
  board[r][c] = 2;
  moveHistory.push({r, c, player: 2});
  lastMoveR = r; lastMoveC = c;
  if (checkWin(r, c, 2)) {
    gameOver = true;
    drawBoard();
    showOverlay('白棋 获胜!', 'AI 白棋取得胜利');
    return;
  }
  let draw = true;
  for (let rr = 0; rr < boardSize; rr++)
    for (let cc = 0; cc < boardSize; cc++)
      if (board[rr][cc] === 0) { draw = false; break; }
  if (draw) { gameOver = true; drawBoard(); showOverlay('平局', '棋盘已满'); return; }
  currentPlayer = 1;
  statusEl.innerHTML = '黑棋 <span class="player black"></span> 落子';
  drawBoard();
}

function handleClick(e) {
  if (gameOver || aiThinking) return;
  if (aiEnabled && currentPlayer === 2) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = displaySize / rect.width;
  const scaleY = displaySize / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top) * scaleY;
  const intersection = getIntersection(px, py);
  if (!intersection) return;
  const {r, c} = intersection;
  if (board[r][c] !== 0) return;
  board[r][c] = currentPlayer;
  if (currentPlayer === 1 && isForbidden(r, c)) {
    board[r][c] = 0;
    statusEl.innerHTML = '⚫ <span style="color:#ff6666">禁手！黑棋不可落此位置</span>';
    return;
  }
  moveHistory.push({r, c, player: currentPlayer});
  lastMoveR = r; lastMoveC = c;
  if (checkWin(r, c, currentPlayer)) {
    gameOver = true;
    drawBoard();
    showOverlay(`${currentPlayer === 1 ? '黑棋' : '白棋'} 获胜!`, '');
    return;
  }
  let draw = true;
  for (let rr = 0; rr < boardSize; rr++)
    for (let cc = 0; cc < boardSize; cc++)
      if (board[rr][cc] === 0) { draw = false; break; }
  if (draw) { gameOver = true; drawBoard(); showOverlay('平局', '棋盘已满'); return; }
  if (aiEnabled) {
    currentPlayer = 2;
    drawBoard();
    aiMove();
  } else {
    currentPlayer = currentPlayer === 1 ? 2 : 1;
    statusEl.innerHTML = `${currentPlayer === 1 ? '黑棋' : '白棋'} <span class="player ${currentPlayer === 1 ? 'black' : 'white'}"></span> 落子`;
    drawBoard();
  }
}

function undoMove() {
  if (gameOver || aiThinking || moveHistory.length === 0) return;
  const steps = aiEnabled ? 2 : 1;
  for (let i = 0; i < steps && moveHistory.length > 0; i++) {
    const m = moveHistory.pop();
    board[m.r][m.c] = 0;
  }
  winLine = null;
  if (moveHistory.length > 0) {
    const prev = moveHistory[moveHistory.length - 1];
    lastMoveR = prev.r; lastMoveC = prev.c;
  } else {
    lastMoveR = -1; lastMoveC = -1;
  }
  currentPlayer = moveHistory.length > 0 ? (moveHistory[moveHistory.length - 1].player === 1 ? 2 : 1) : 1;
  statusEl.innerHTML = `${currentPlayer === 1 ? '黑棋' : '白棋'} <span class="player ${currentPlayer === 1 ? 'black' : 'white'}"></span> ${currentPlayer === 1 ? '先行' : '落子'}`;
  drawBoard();
}

function newGame() {
  board = Array(boardSize).fill(null).map(() => Array(boardSize).fill(0));
  currentPlayer = 1;
  gameOver = false;
  winLine = null;
  lastMoveR = -1; lastMoveC = -1;
  moveHistory = [];
  aiThinking = false;
  document.getElementById('overlay').classList.add('hidden');
  forbiddenEnabled = btnForbidden.classList.contains('on');
  aiEnabled = btnAI.classList.contains('on');
  const aiText = aiEnabled ? ' (人机对战)' : '';
  const fbText = forbiddenEnabled ? ' (禁手开启)' : '';
  statusEl.innerHTML = '黑棋 <span class="player black"></span> 先行' + fbText + aiText;
  drawBoard();
}

function showOverlay(title, msg) {
  document.getElementById('overlayTitle').textContent = title;
  document.getElementById('overlayMsg').textContent = msg;
  document.getElementById('overlay').classList.remove('hidden');
}

canvas.addEventListener('click', handleClick);
document.getElementById('btnRestart').addEventListener('click', newGame);
document.getElementById('btnUndo').addEventListener('click', undoMove);
document.getElementById('btnReplay').addEventListener('click', newGame);
document.getElementById('btnDismiss').addEventListener('click', () => {
  document.getElementById('overlay').classList.add('hidden');
});

btnForbidden.addEventListener('click', () => {
  btnForbidden.classList.toggle('on');
  forbiddenEnabled = btnForbidden.classList.contains('on');
  btnForbidden.textContent = forbiddenEnabled ? '禁手：开' : '禁手：关';
  if (!gameOver) {
    const aiText = aiEnabled ? ' (人机对战)' : '';
    const fbText = forbiddenEnabled ? ' (禁手开启)' : '';
    statusEl.innerHTML = `${currentPlayer === 1 ? '黑棋' : '白棋'} <span class="player ${currentPlayer === 1 ? 'black' : 'white'}"></span> ${currentPlayer === 1 ? '先行' : '落子'}` + fbText + aiText;
  }
});

btnAI.addEventListener('click', () => {
  btnAI.classList.toggle('on');
  aiEnabled = btnAI.classList.contains('on');
  btnAI.textContent = aiEnabled ? '人机对战' : '双人对战';
  newGame();
});

newGame();
</script>
</body>
</html>
