<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  user-select: none;
}
.container {
  text-align: center;
}
h1 {
  color: #e0c080;
  font-size: 3rem;
  margin-bottom: 15px;
}
.status {
  color: #fff;
  font-size: 1.5rem;
  margin-bottom: 15px;
  min-height: 1.8em;
}
.status .player {
  display: inline-block;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  vertical-align: middle;
  margin: 0 5px;
  border: 2px solid #555;
}
.status .player.black { background: #222; }
.status .player.white { background: #eee; }
.status .highlight {
  color: #4caf50;
  font-weight: bold;
  font-size: 1.5rem;
}
canvas {
  cursor: pointer;
  border-radius: 8px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
.controls {
  margin-top: 15px;
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
}
.btn {
  padding: 10px 30px;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-new {
  background: #4caf50;
  color: #fff;
}
.btn-new:hover { background: #45a049; }
.btn-back {
  background: rgba(255,255,255,0.1);
  color: #ccc;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
}
.btn-back:hover { background: rgba(255,255,255,0.2); }
.info {
  color: #888;
  margin-top: 10px;
  font-size: 0.9rem;
}
</style>
</head>
<body>
<div class="container">
  <h1>⚫ 五子棋 ⚪</h1>
  <div class="status" id="status">
    黑棋 <span class="player black"></span> 先行
  </div>
  <canvas id="canvas" width="630" height="630"></canvas>
  <div class="controls">
    <button class="btn btn-new" id="btnRestart">重新开始</button>
    <a href="index.html" class="btn btn-back">返回首页</a>
  </div>
  <p class="info">点击棋盘落子 · 先连成五子者胜</p>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const boardSize = 15;
const cellSize = canvas.width / (boardSize + 1);
const margin = cellSize;

let board = Array(boardSize).fill(null).map(() => Array(boardSize).fill(0));
let currentPlayer = 1; // 1 = black, 2 = white
let gameOver = false;
let winLine = null;

function drawBoard() {
  // Wooden board background
  const bgGradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  bgGradient.addColorStop(0, '#deb887');
  bgGradient.addColorStop(0.5, '#d2a679');
  bgGradient.addColorStop(1, '#c8956c');
  ctx.fillStyle = bgGradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = '#5a3e2b';
  ctx.lineWidth = 0.8;
  for (let i = 0; i < boardSize; i++) {
    const pos = margin + i * cellSize;
    ctx.beginPath();
    ctx.moveTo(margin, pos);
    ctx.lineTo(margin + (boardSize - 1) * cellSize, pos);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pos, margin);
    ctx.lineTo(pos, margin + (boardSize - 1) * cellSize);
    ctx.stroke();
  }

  // Star points
  const starPoints = boardSize === 15 ? [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]] : [];
  starPoints.forEach(([r, c]) => {
    const x = margin + c * cellSize;
    const y = margin + r * cellSize;
    ctx.fillStyle = '#5a3e2b';
    ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();
  });

  // Stones
  for (let r = 0; r < boardSize; r++) {
    for (let c = 0; c < boardSize; c++) {
      if (board[r][c] === 0) continue;
      const x = margin + c * cellSize;
      const y = margin + r * cellSize;
      const radius = cellSize * 0.42;

      if (board[r][c] === 1) {
        const grad = ctx.createRadialGradient(x - radius*0.3, y - radius*0.3, radius*0.1, x, y, radius);
        grad.addColorStop(0, '#555');
        grad.addColorStop(0.6, '#111');
        grad.addColorStop(1, '#000');
        ctx.fillStyle = grad;
      } else {
        const grad = ctx.createRadialGradient(x - radius*0.3, y - radius*0.3, radius*0.1, x, y, radius);
        grad.addColorStop(0, '#fff');
        grad.addColorStop(0.6, '#ddd');
        grad.addColorStop(1, '#bbb');
        ctx.fillStyle = grad;
      }

      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();

      // Highlight last move
      if (r === lastMoveR && c === lastMoveC) {
        ctx.strokeStyle = '#ff4444';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, radius * 0.35, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
  }

  // Win line
  if (winLine) {
    const [r1, c1] = winLine[0];
    const [r2, c2] = winLine[1];
    const x1 = margin + c1 * cellSize;
    const y1 = margin + r1 * cellSize;
    const x2 = margin + c2 * cellSize;
    const y2 = margin + r2 * cellSize;

    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 4]);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

let lastMoveR = -1, lastMoveC = -1;

function getIntersection(px, py) {
  const c = Math.round((px - margin) / cellSize);
  const r = Math.round((py - margin) / cellSize);
  const cx = margin + c * cellSize;
  const cy = margin + r * cellSize;
  const dist = Math.hypot(px - cx, py - cy);
  if (r < 0 || r >= boardSize || c < 0 || c >= boardSize) return null;
  if (dist > cellSize * 0.45) return null;
  return {r, c};
}

function checkWin(r, c, player) {
  const directions = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of directions) {
    let count = 1;
    let i = 1;
    let startR = r, startC = c, endR = r, endC = c;

    while (true) {
      const nr = r + dr * i, nc = c + dc * i;
      if (nr < 0 || nr >= boardSize || nc < 0 || nc >= boardSize || board[nr][nc] !== player) break;
      count++;
      endR = nr; endC = nc;
      i++;
    }

    i = 1;
    while (true) {
      const nr = r - dr * i, nc = c - dc * i;
      if (nr < 0 || nr >= boardSize || nc < 0 || nc >= boardSize || board[nr][nc] !== player) break;
      count++;
      startR = nr; startC = nc;
      i++;
    }

    if (count >= 5) {
      winLine = [[startR, startC], [endR, endC]];
      return true;
    }
  }
  return false;
}

function handleClick(e) {
  if (gameOver) return;

  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top) * scaleY;

  const intersection = getIntersection(px, py);
  if (!intersection) return;
  const {r, c} = intersection;
  if (board[r][c] !== 0) return;

  board[r][c] = currentPlayer;
  lastMoveR = r;
  lastMoveC = c;

  if (checkWin(r, c, currentPlayer)) {
    gameOver = true;
    drawBoard();
    statusEl.innerHTML = `<span class="highlight">${currentPlayer === 1 ? '黑棋' : '白棋'}</span> 获胜!`;
    return;
  }

  // Check draw
  let draw = true;
  for (let rr = 0; rr < boardSize; rr++)
    for (let cc = 0; cc < boardSize; cc++)
      if (board[rr][cc] === 0) { draw = false; break; }

  if (draw) {
    gameOver = true;
    drawBoard();
    statusEl.innerHTML = '平局!';
    return;
  }

  currentPlayer = currentPlayer === 1 ? 2 : 1;
  statusEl.innerHTML = `${currentPlayer === 1 ? '黑棋' : '白棋'} <span class="player ${currentPlayer === 1 ? 'black' : 'white'}"></span> 落子`;
  drawBoard();
}

function newGame() {
  board = Array(boardSize).fill(null).map(() => Array(boardSize).fill(0));
  currentPlayer = 1;
  gameOver = false;
  winLine = null;
  lastMoveR = -1;
  lastMoveC = -1;
  statusEl.innerHTML = '黑棋 <span class="player black"></span> 先行';
  drawBoard();
}

canvas.addEventListener('click', handleClick);
document.getElementById('btnRestart').addEventListener('click', newGame);

drawBoard();
</script>
</body>
</html>
