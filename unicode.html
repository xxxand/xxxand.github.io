<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unicode 互转</title>
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/unicode.css" />
  </head>
  <body>
    <div class="container">
      <a href="index.html" class="btn-back">← 返回首页</a>
      <h1>Unicode 互转</h1>
      <p class="subtitle">中文 ↔ \\uXXXX 格式</p>

      <div class="mode">
        <span id="modeText">当前：中文 → Unicode</span>
        <button class="btn btn-swap" id="btnSwap" title="切换方向">⇄</button>
      </div>
      <div class="row">
        <label for="inputBox">输入</label>
        <textarea id="inputBox" placeholder="输入中文或 \\uXXXX 编码..."></textarea>
      </div>
      <div class="btns">
        <button class="btn btn-convert" id="btnConvert">转换</button>
        <button class="btn btn-copy" id="btnCopy">复制结果</button>
      </div>
      <div class="row" style="margin-top: 16px">
        <label for="outputBox">输出</label>
        <textarea id="outputBox" readonly></textarea>
      </div>
    </div>

    <script src="js/unicode.js" defer></script>
  </body>
</html>
