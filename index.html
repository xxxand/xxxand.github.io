<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>箩煌</title>
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="title">本主页归属于箩煌</h1>

      <section class="section">
        <h2 class="section-title">工具</h2>
        <div class="tools">
          <a href="dfttk.html" class="tool-card">
            <span class="tool-icon">📊</span>
            <div class="tool-name">三角洲行动全面战场枪械TTK排行</div>
            <div class="tool-desc">查看各武器击杀时间数据</div>
          </a>
          <a href="unicode.html" class="tool-card">
            <span class="tool-icon">🔤</span>
            <div class="tool-name">Unicode 互转</div>
            <div class="tool-desc">中文 ↔ \\uXXXX 编码</div>
          </a>
          <a href="utf8.html" class="tool-card">
            <span class="tool-icon">🔣</span>
            <div class="tool-name">UTF-8 互转</div>
            <div class="tool-desc">中文 ↔ UTF-8 十六进制</div>
          </a>
          <a href="base64.html" class="tool-card">
            <span class="tool-icon">🔐</span>
            <div class="tool-name">Base64 编解码</div>
            <div class="tool-desc">文本 ↔ Base64 编码</div>
          </a>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">游戏</h2>
        <div class="games">
          <a href="snake.html" class="game-card snake">
            <span class="game-icon">🐍</span>
            <div class="game-name">贪吃蛇</div>
            <div class="game-desc">经典贪吃蛇<br />键盘/触屏控制，可调速</div>
          </a>

          <a href="2048.html" class="game-card g2048">
            <span class="game-icon">🔢</span>
            <div class="game-name">2048</div>
            <div class="game-desc">数字合并益智游戏<br />方向键滑动，凑出2048</div>
          </a>

          <a href="gomoku.html" class="game-card gomoku">
            <span class="game-icon">⚫⚪</span>
            <div class="game-name">五子棋</div>
            <div class="game-desc">双人对战 / 人机对战<br />点击落子，先连五子者胜</div>
          </a>

          <a href="minesweeper.html" class="game-card mine">
            <span class="game-icon">💣</span>
            <div class="game-name">扫雷</div>
            <div class="game-desc">9×9 经典扫雷<br />点击揭开，长按标旗</div>
          </a>
        </div>
      </section>
    </div>
  </body>
</html>
