<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UTF-8 互转</title>
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/utf8.css" />
  </head>
  <body>
    <a href="index.html" class="back-top">← 返回首页</a>
    <div class="container">
      <h1>UTF-8 互转</h1>
      <p class="subtitle">中文 ↔ UTF-8 十六进制</p>

      <div class="mode">
        <span id="modeText">当前：中文 → UTF-8</span>
        <button class="btn btn-swap" id="btnSwap" title="切换方向">⇄</button>
      </div>
      <div class="row">
        <label for="inputBox">输入</label>
        <textarea
          id="inputBox"
          placeholder="输入中文或 UTF-8 十六进制（如 E4 B8 AD）..."
        ></textarea>
      </div>
      <div class="btns">
        <button class="btn btn-convert" id="btnConvert">转换</button>
        <button class="btn btn-copy" id="btnCopy">复制结果</button>
      </div>
      <div class="row output-row">
        <label for="outputBox">输出</label>
        <textarea id="outputBox" readonly></textarea>
      </div>
    </div>

    <script src="js/utf8.js" defer></script>
  </body>
</html>
